{% extends "base.html" %}

{% block title %}Вход | EdTech{% endblock %}

{% block content %}
<main class="container page" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 32px;">
        <h2 style="font-family: 'Syne', sans-serif; margin-bottom: 8px;">С возвращением</h2>
        <p style="color: var(--muted); font-size: 0.875rem; margin-bottom: 24px;">Введите свои данные для входа в систему.</p>

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 0.75rem; color: var(--dim); margin-bottom: 6px; font-family: 'JetBrains Mono';">USERNAME</label>
                <input type="text" name="username" required style="width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--rs); padding: 10px; color: var(--text); outline: none;">
            </div>
            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 0.75rem; color: var(--dim); margin-bottom: 6px; font-family: 'JetBrains Mono';">PASSWORD</label>
                <input type="password" name="password" required style="width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--rs); padding: 10px; color: var(--text); outline: none;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px;">Войти</button>
        </form>

        <div style="margin-top: 24px; text-align: center; font-size: 0.875rem;">
            <span style="color: var(--muted);">Нет аккаунта?</span>
            <a href="{% url 'register' %}" style="color: var(--accent); text-decoration: none; font-weight: 600; margin-left: 4px;">Создать</a>
        </div>
    </div>
</main>
{% endblock %}
